name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: App
        run: npm ci

      - name: Build React frontend
        working-directory: App
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build CSS
        working-directory: App
        run: npm run build:css

      - name: Create release zip
        run: |
          # Copy repo to a staging folder
          mkdir -p staging
          rsync -av --progress . staging/ \
            --exclude staging \
            --exclude .git \
            --exclude .gitignore \
            --exclude "*.yml" \
            --exclude "*.yaml" \
            --exclude "composer.json" \
            --exclude "*.lock" \
            --exclude "*.dist" \
            --exclude "*.neon" \
            --exclude App

          # Add only what we want from App
          mkdir -p staging/App/build
          cp -r App/build/. staging/App/build/
          mkdir -p staging/App/src
          cp App/src/tailwind.generated.css staging/App/src/tailwind.generated.css

          # Zip the staging folder
          cd staging && zip -r ../burst-mainwp.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: burst-mainwp.zip
          generate_release_notes: true
