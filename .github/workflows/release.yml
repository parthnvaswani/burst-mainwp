name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: App
        run: npm ci --legacy-peer-deps

      - name: Build React frontend
        working-directory: App
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build CSS
        working-directory: App
        run: npm run build:css

      - name: Create release zip
        run: |
          zip -r burst-mainwp.zip . \
            --exclude "*.git*" \
            --exclude ".gitignore" \
            --exclude "*.yml" \
            --exclude "*.yaml" \
            --exclude "composer.json" \
            --exclude "*.lock" \
            --exclude "*.dist" \
            --exclude "*.neon" \
            --exclude "App/*" \
            --include "App/build/*" \
            --include "App/src/tailwind.generated.css"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: burst-mainwp.zip
          generate_release_notes: true
