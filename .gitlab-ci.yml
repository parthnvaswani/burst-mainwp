stages:
  - code_quality
  - plugin_check

workflow:
  auto_cancel:
    on_job_failure: all
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      when: never
    - when: always

# ─── PHP Compatibility ────────────────────────────────────────────────────────

php_compatibility:
  stage: code_quality
  interruptible: true
  image:
    name: "php:${PHP_VERSION}-cli"
  parallel:
    matrix:
      - PHP_VERSION:
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
  script:
    - php -v
    - find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -print0 | xargs -0 -n1 php -l

# ─── PHPCS + PHPStan ──────────────────────────────────────────────────────────

test:code-quality:
  stage: code_quality
  interruptible: true
  image:
    name: source.updraftplus.com:5050/ci/playwright-e2e:php-8.4-wp-7.0-beta1
    entrypoint: [""]
  needs: [php_compatibility]
  cache:
    - key:
        files:
          - composer.json
          - composer.lock
      paths:
        - vendor/
        - composer.phar
  before_script:
    - test -f composer.phar || curl -sS https://getcomposer.org/installer | php
    - php composer.phar config -g github-oauth.github.com $GITHUB_TOKEN
    - php composer.phar install --no-interaction --prefer-dist --optimize-autoloader
  script:
    - php composer.phar lint
    - php composer.phar lint:report
    - php composer.phar phpstan:gitlab

# ─── Plugin Check ─────────────────────────────────────────────────────────────

test:plugin-check:
  stage: plugin_check
  interruptible: true
  image:
    name: source.updraftplus.com:5050/ci/playwright-e2e:php-8.4-wp-7.0-beta1
    entrypoint: [""]
  needs: [test:code-quality]
  before_script:
    - bash /usr/local/bin/entrypoint.sh
    - cp -R . /var/www/html/wp-content/plugins/burst-mainwp/
    - chown -R www-data:www-data /var/www/html/wp-content/plugins/burst-mainwp/
    - wp plugin install mainwp --activate --path=/var/www/html
    - wp plugin activate burst-mainwp --path=/var/www/html
    - wp plugin install plugin-check --activate --path=/var/www/html
  script:
    - wp plugin check burst-mainwp --path=/var/www/html --format=table 2>&1 | tee plugin-check-report.txt
  artifacts:
    paths:
      - plugin-check-report.txt
    expire_in: 1 week
    when: always
